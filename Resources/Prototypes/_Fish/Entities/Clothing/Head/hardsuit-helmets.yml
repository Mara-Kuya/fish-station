- type: entity
  parent: ClothingHeadHelmetVoidParamed
  id: ClothingHeadHelmetVoidParamedFish
  name: paramedic void helmet
  description: A void helmet made for paramedics.
  suffix: Fish
  components:
  - type: Sprite
    sprite: _Fish/Clothing/Head/Hardsuits/paramedhelm.rsi
  - type: Clothing
    sprite: _Fish/Clothing/Head/Hardsuits/paramedhelm.rsi
    clothingVisuals: # Fish
      head:
      - state: equipped-head
      head-vox:
      - state: equipped-head
      head-dog:
      - state: equipped-head
  - type: ToggleableVisuals
    clothingVisuals: # Fish
      head:
      - state: equipped-head-light
      head-vox:
      - state: equipped-head-light
      head-dog:
      - state: equipped-head-light

- type: entity
  parent: ClothingHeadHelmetHardsuitDeathsquad
  id: ClothingHeadHelmetHardsuitDeathsquadFish
  suffix: Fish
  components:
  - type: PointLight
    radius: 9
    energy: 9
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
        Radiation: 0.80
        Caustic: 0.95
        Poison: 0.80
        Shock: 0.80
  - type: ItemToggle
    predictable: false
    onUse: false
    canActivateInhand: false
    soundActivate:
      path: /Audio/_Sunrise/Items/Goggles/activate.ogg
    soundDeactivate:
      path: /Audio/_Sunrise/Items/Goggles/deactivate.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: ComponentToggler
    parent: true
    components:
    - type: NightVision
      effect: EffectNightVision
  - type: ToggleClothing
    action: NVDToggleAction
    mustEquip: true
    disableOnUnequip: true
    targetSlot: head
