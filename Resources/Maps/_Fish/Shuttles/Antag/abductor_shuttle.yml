- proto: HolographicPaper
  entities:
  - uid: 347
    components:
    - type: Transform
      pos: 0.50142187,0.42228818
      parent: 2
    - type: Paper
      content: >2-
                    [head=1]Инструкция №Ψ-37/К[/head]
        ================================================
                                                       [head=2]Цель[/head]
        Контролируемое похищение одного или более особей местного разумного вида в рамках программ:


        [bold]1) Полевой зоосоциальной оценки[/bold]


        [bold]2) Биологического тестирования[/bold]


        [bold]3) Культурного обмена (в одностороннем порядке)[/bold]


        Запрещено: похищение с целью импровизированного стендапа, кулинарных экспериментов, а также личной мести.

                                       [head=2]Общее пособие[/head]

        Вы должны похитить представителя инопланетной расы, внедрить в него определенный орган вместо сердца, и вернуть в [bold]целости и сохранности[/bold] на станцию.


        Операцию по похищению выполняет агент, в то время как ученый - проводит операцию по замене сердца и контролирует телепортацию.


        Агент обладает всем необходимым снаряжением: жилетом с 2 режимами работы, энергетическим пистолетом, глушителем и вондерпродом с 4 режимами использования.


        Ученый же имеет у себя [bold]Гизмо[/bold], необходимый для выставления межпространственной метки на том или ином субъекте.

                          [head=2]Пособие по телепортации[/head]

        Для телепорации агента, абдуктору-ученому требуется воспользоваться [bold]консолью наблюдения[/bold], а агенту [bold]встать на телепортационную площадку[/bold]. Как только ученый найдет нужное место, он может инициировать телепортацию путем нажатия кнопки [bold]"Телепортировать агента"[/bold].


        Агента можно вернуть, если пометить его при помощи Гизмо. Просто выберите опцию [bold]"Пометить Гизмо"[/bold] в консоли наблюдения и нажмите на агента. Затем перейдите к исследовательской консоли и нажмите "Телепортировать". [bold]Важно: чтобы пометить агента, вы должны держать Гизмо в вашем кармане.[/bold]

                         [head=2]Пособие по инструментам[/head]

        [bold]Вондерпрод[/bold] - оружие, имеющее 4 режима использования. Обладает неограниченным зарядом


        [bold]Пистолет[/bold] - оружие дальнего боя с режимами летального и оглушающего огня.


        [bold]Глушитель[/bold] - позволяет сделать жертву неспособной к вопроизведению речевой функции


        [bold]Гизмо[/bold] - помечает жертву или агента для дальнейшей телепортации через консоль


        [bold]Жилет[/bold] - может быть привязан к консоли путем прикоснования к ней с жилетом в руках. Имеет 2 режима - стелс и боевой.


        [bold]Экстрактор сердца[/bold] - позволяет извлечь сердце из открытой грудной клетки


        [bold]Шлем[/bold] - обеспечивает небольшую защиту для абдуктора.

                              [head=2]Шаги по похищению[/head]

        1) Абдуктор-агент телепортируется на станцию и [bold]обездвиживает жертву[/bold].


        2) Абдуктор-учёный телепортируется к агенту, используя консоль наблюдений и кнопку [bold]"Телепортировать себя"[/bold]


        3) Абдуктор-ученый помечает субъект при помощи [bold]"Гизмо"[/bold] (достаточно просто прикоснуться инструментом)


        4) Абдуктор-ученый возвращается на корабль, используя функцию [bold]"Вернуться на корабль"[/bold], вносит данные с Гизмо в консоль исследований (достаточно прикоснуться инструментом к консоли), и нажимает на кнопку [bold]"Телепортировать"[/bold], как только она стала доступна


        5) По необходимости можно вернуть агента

                              [head=2]Шаги по эксперименту[/head]

        1) Абдуктор-ученый может [bold]усыпить жертву[/bold] при помощи баллона с оксидом азота для безопасности


        2) Абдуктор-ученый помещает жертву на операционный стол, и выполняет операции в следующем порядке: [bold]Открыть порез туловища-Открыть грудную клетку-Извлечь сердце-Имплантировать сердце[/bold]


        3) Абдуктор-ученый внедряет гланду, которую можно взять из диспенсера, и затем [bold]зашивает все порезы[/bold]


        4) Как только все это выполнено - следует [bold]поместить жертву в капсулу[/bold] и затем нажать на кнопку [bold]"Завершить эксперимент"[/bold] в консоли исследований. Каждый завершеннный эксперимент приносит вам [bold]1 очко прогресса[/bold], которое вы можете потратить на покупки в магазине
